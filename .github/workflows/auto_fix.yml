name: Auto Fix Dead Links

on:
  schedule:
    - cron: '*/30 * * * *'  # Her 30 dakikada bir çalış
  workflow_dispatch:  # Manuel de tetiklenebilir

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml
      
      - name: Run auto link discovery
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python scripts/auto_series_scraper.py
          python scripts/scrape_series.py  # Yeniden dene
      
      - name: Check if links improved
        run: |
          # Ölü link oranını kontrol et
          DEAD_COUNT=$(grep -c "❌" output/scrape_log.txt || true)
          echo "Ölü link sayısı: $DEAD_COUNT"
          
          if [ $DEAD_COUNT -lt 5 ]; then
            echo "HEALTHY=true" >> $GITHUB_ENV
          fi
      
      - name: Commit working sources
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/working_sources.json output/series.m3u
          git commit -m "🤖 Auto-updated working sources" || exit 0
          git push
