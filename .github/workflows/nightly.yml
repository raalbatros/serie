name: Nightly Series M3U Update

on:
  schedule:
    # Her gece 02:30 UTC'de çalışır (film workflow'dan 30dk sonra)
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual trigger reason"
        required: false
        default: "Manual run"

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape & Build Series M3U
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run series scraper
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
        run: python scripts/scrape_series.py

      - name: Show stats
        run: |
          echo "=== Series M3U Stats ==="
          wc -l output/series.m3u
          echo ""
          echo "=== First 30 lines ==="
          head -30 output/series.m3u

      - name: Commit & push updated playlist
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "📺 Nightly series update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
