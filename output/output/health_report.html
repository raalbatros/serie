<!DOCTYPE html>
<html>
<head><title>Series Link Health Report</title></head>
<body>
<h1>📊 Link Sağlık Raporu</h1>
<div id="stats"></div>
<script>
fetch('working_sources.json')
  .then(r => r.json())
  .then(data => {
    const total = Object.keys(data).length;
    document.getElementById('stats').innerHTML = `
      <p>✅ Çalışan link sayısı: ${total}</p>
      <p>🔄 Son güncelleme: ${new Date().toLocaleString()}</p>
    `;
  });
</script>
</body>
</html>
